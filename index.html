<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Buoy Fleet — Iridium Ground Station</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link rel="stylesheet" href="styles.css" />
<style>
  body.hide-marker-labels .buoy-marker .label { display: none; }
  body.hide-legend .map-legend { display: none; }
  body.hide-console .iridium-console { display: none; }
  .buoy-marker.tx-flash .core {
    animation: txflash .4s ease-out;
  }
  @keyframes txflash {
    0% { box-shadow: 0 0 0 0 #fff, 0 0 0 4px rgba(255,255,255,.6); }
    100% { box-shadow: 0 0 0 0 transparent, 0 0 0 12px rgba(255,255,255,0); }
  }

  /* ── Mode switcher — matches sidebar "+ Add buoy" button exactly ── */
  .mode-switcher {
    display: flex;
    gap: 4px;
    margin-left: 12px;
  }
  .mode-btn {
    background: var(--bg-2);
    color: var(--fg-1);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .mode-btn:hover {
    background: var(--bg-3);
    color: var(--fg-0);
    border-color: var(--line-2);
  }
  .mode-btn.active {
    background: var(--accent);
    color: #06222a;
    border-color: var(--accent);
  }

  /* ── Vessel panel — full landscape layout ─────────────────────── */
  .vessel-panel {
    grid-area: main;
    display: grid;
    grid-template-rows: 36px 1fr;
    overflow: hidden;
    background: var(--bg-0);
  }

  /* vessel tab bar matches topbar style */
  .vessel-tabbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
    gap: 4px;
  }
  .vessel-tabbar-left { display: flex; gap: 3px; }

  .vessel-tab {
    background: transparent;
    color: var(--fg-2);
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0 12px;
    height: 36px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer;
    font-family: var(--sans);
    transition: color 0.15s, border-color 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .vessel-tab:hover { color: var(--fg-0); }
  .vessel-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .vessel-tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: vdot 1s infinite;
  }
  @keyframes vdot { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .vessel-fb-pill {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-3);
    padding: 2px 8px;
    border-radius: var(--r-sm);
    background: var(--bg-2);
    border: 1px solid var(--line);
  }
  .vessel-fb-pill.ok { color: var(--accent); background: rgba(77,214,225,0.07); border-color: rgba(77,214,225,0.2); }
  .vessel-fb-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* vessel screen area */
  .vessel-screen {
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ── Discover — full landscape split ─────────────────────────── */
  .discover {
    display: grid;
    grid-template-columns: 1fr 280px;
    height: 100%;
    overflow: hidden;
  }
  .radar-wrap {
    display: flex; flex-direction: column;
    background: var(--bg-0);
    border-right: 1px solid var(--line);
    padding: 10px;
    overflow: hidden;
    min-height: 0;
  }
  .radar-header {
    display: flex; justify-content: space-between;
    padding-bottom: 8px;
    font-family: var(--mono); font-size: 10px;
    color: var(--fg-2); flex-shrink: 0;
  }
  .radar-header .kvs { display: flex; flex-direction: column; gap: 2px; }
  .radar-header .kv b { color: var(--accent); font-weight: 500; }
  .radar-svg { flex: 1; width: 100%; min-height: 0; }
  .radar-foot {
    display: flex; justify-content: space-between;
    padding-top: 6px; font-family: var(--mono);
    font-size: 9px; color: var(--fg-3); flex-shrink: 0;
  }

  .side-panel {
    display: flex; flex-direction: column;
    gap: 8px; padding: 10px;
    overflow-y: auto;
    background: var(--bg-1);
  }
  .contact-list {
    display: flex; flex-direction: column;
    gap: 2px; max-height: 180px; overflow-y: auto;
  }
  .contact-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px; border-radius: var(--r-sm);
    cursor: pointer; transition: background 0.12s;
  }
  .contact-row:hover { background: var(--bg-3); }
  .contact-row.sel { background: rgba(77,214,225,0.08); }
  .contact-row.offline { opacity: 0.45; }
  .contact-row .blip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .contact-row.offline .blip { background: var(--fg-3); }
  .contact-row .name { font-size: 12px; font-weight: 500; color: var(--fg-0); }
  .contact-row .meta { font-family: var(--mono); font-size: 9px; color: var(--fg-3); }
  .contact-row .rssi { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--accent); text-align: right; }

  /* ── Configure — full landscape two-col ──────────────────────── */
  .cfg-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px; padding: 14px;
    height: 100%; overflow-y: auto;
  }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: .1em; text-transform: uppercase; color: var(--fg-2);
  }
  .input {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: var(--r-sm); color: var(--fg-0);
    font-family: var(--mono); font-size: 12px;
    padding: 6px 9px; outline: none; transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--accent-dim); }
  .hint { font-family: var(--mono); font-size: 9px; color: var(--fg-3); }
  .row-3 { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }

  /* byte map */
  .bytemap-wrap {
    background: var(--bg-1); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 14px;
  }
  .bytemap { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 10px; }
  .byte {
    display: flex; flex-direction: column; align-items: center;
    width: 28px; padding: 3px 2px; border-radius: 3px;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    background: var(--bg-2); color: var(--fg-2);
  }
  .byte .idx { font-size: 7px; color: var(--fg-3); margin-bottom: 1px; }
  .byte.cmd  { background: rgba(240,109,109,0.15); color: #f06d6d; }
  .byte.ssid { background: rgba(77,214,225,0.12);  color: var(--accent); }
  .byte.pass { background: rgba(245,185,72,0.12);  color: #f5b948; }
  .byte.ip   { background: rgba(106,169,255,0.12); color: #6aa9ff; }
  .byte.port { background: rgba(160,130,255,0.12); color: #a082ff; }
  .byte.rsv  { background: var(--bg-2); color: var(--fg-3); }
  .legend { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .li { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 9px; color: var(--fg-2); }
  .sw { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
  .sw.cmd  { background: rgba(240,109,109,0.5); }
  .sw.ssid { background: rgba(77,214,225,0.5); }
  .sw.pass { background: rgba(245,185,72,0.5); }
  .sw.ip   { background: rgba(106,169,255,0.5); }
  .sw.port { background: rgba(160,130,255,0.5); }
  .sw.rsv  { background: var(--bg-3); }

  /* ── Command screen ───────────────────────────────────────────── */
  .cmd-grid { display: flex; flex-direction: column; gap: 7px; }
  .cmd-opt {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px; border: 1px solid var(--line);
    border-radius: var(--r-md); cursor: pointer;
    transition: all 0.15s; background: var(--bg-0);
  }
  .cmd-opt:hover { border-color: var(--accent-dim); background: var(--bg-2); }
  .cmd-opt.sel { border-color: var(--accent); background: rgba(77,214,225,0.07); }
  .cmd-opt .radio {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--line); flex-shrink: 0;
    margin-top: 2px; transition: all 0.15s;
  }
  .cmd-opt.sel .radio { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 0 3px rgba(77,214,225,0.18); }
  .cmd-opt .label { font-size: 12px; font-weight: 500; color: var(--fg-0); margin-bottom: 2px; }
  .cmd-opt .sub { font-family: var(--mono); font-size: 9px; color: var(--fg-3); line-height: 1.5; }
  .cmd-opt .code { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--accent); flex-shrink: 0; padding-top: 2px; }

  /* ── Offload — full landscape three-col ──────────────────────── */
  .offload {
    display: grid;
    grid-template-columns: 200px 1fr 170px;
    height: 100%; overflow: hidden;
  }
  .timeline { border-right: 1px solid var(--line); padding: 12px; overflow-y: auto; background: var(--bg-1); }
  .tl-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .tl-head h3 { font-size: 11px; font-weight: 600; color: var(--fg-1); margin: 0; text-transform: uppercase; letter-spacing: .08em; }
  .tl-head .total { font-family: var(--mono); font-size: 9px; color: var(--fg-3); }
  .steps { display: flex; flex-direction: column; gap: 1px; }
  .step {
    display: grid; grid-template-columns: 26px 1fr auto;
    align-items: center; gap: 6px; padding: 6px 7px;
    border-radius: var(--r-sm); opacity: 0.35; transition: all 0.2s;
    border-left: 2px solid transparent;
  }
  .step.active { opacity: 1; background: rgba(77,214,225,0.07); border-left-color: var(--accent); }
  .step.done { opacity: 0.65; }
  .step .s-tag { font-family: var(--mono); font-size: 9px; color: var(--accent); font-weight: 600; }
  .step .s-name { font-size: 10px; color: var(--fg-1); }
  .step .s-t { font-family: var(--mono); font-size: 8px; color: var(--fg-3); }

  .stream { display: flex; flex-direction: column; border-right: 1px solid var(--line); overflow: hidden; background: var(--bg-0); }
  .stream-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .stream-head h3 { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--fg-2); margin: 0; }
  .stream-body { flex: 1; overflow-y: auto; padding: 6px 12px; font-family: var(--mono); font-size: 10px; }
  .stream-line { display: grid; grid-template-columns: 58px 58px 1fr; gap: 6px; padding: 2px 0; color: var(--fg-2); border-bottom: 1px solid rgba(255,255,255,0.02); }
  .stream-line .t { color: var(--fg-3); }
  .stream-line .tag { color: var(--accent); font-weight: 500; }
  .stream-line.good { color: var(--accent); }
  .stream-line.bad { color: var(--st-error); }
  .stream-foot { display: flex; justify-content: space-between; padding: 6px 12px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 9px; color: var(--fg-3); flex-shrink: 0; }

  .rail { display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-1); }
  .metric { padding: 12px; border-bottom: 1px solid var(--line); }
  .m-label { font-family: var(--mono); font-size: 8px; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 3px; }
  .m-value { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--fg-0); line-height: 1.1; }
  .m-value .u { font-size: 11px; color: var(--fg-3); margin-left: 1px; }
  .m-sub { font-family: var(--mono); font-size: 8px; color: var(--fg-3); margin-top: 3px; }
  .bar-track { height: 3px; background: var(--bg-3); border-radius: 2px; margin: 5px 0 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* ── Shared panel/button styles ───────────────────────────────── */
  .panel { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; }
  .panel-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 11px; border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--fg-2); background: var(--bg-2);
  }
  .panel-body { padding: 10px; }
  .kv-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 14px; font-size: 11px; }
  .kv-grid .k { color: var(--fg-3); font-family: var(--mono); font-size: 9px; white-space: nowrap; align-self: center; }
  .kv-grid .v { color: var(--fg-0); font-family: var(--mono); font-size: 10px; }
  .kv-grid .v.good { color: var(--accent); }
  .kv-grid .v.warn { color: var(--st-warn); }

  /* btn matches sidebar "+ Add buoy" exactly */
  .btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border: none; border-radius: var(--r-sm);
    background: var(--accent); color: #06222a;
    font-size: 11px; font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer; font-family: var(--sans);
    transition: background 0.15s;
  }
  .btn:hover:not(:disabled) { background: #6ce4ee; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.ghost {
    background: var(--bg-2); color: var(--fg-1);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover:not(:disabled) { background: var(--bg-3); color: var(--fg-0); border-color: var(--line-2); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="module" src="firebase_init.js"></script>

<script src="data.js"></script>

</html>
